  <text x="520" y="268" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Zero-Trust Enforced</text>
  <text x="520" y="281" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Every request verified</text>

  <rect x="408" y="296" width="204" height="34" rx="6" fill="#0A1628" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <text x="445" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f59e0b">📈</text>
  <text x="520" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Infinite Scalability</text>
  <text x="520" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Hybrid &amp; multi-cloud</text>

  <text x="510" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4ade80">✓ Fast · Cost-Efficient · Scalable</text>

  <!-- === RIGHT: Outcomes === -->
  <rect x="648" y="88" width="138" height="270" rx="10" fill="#0D1F35" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="717" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#4ade80">Outcomes</text>

  <text x="717" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#00B8FF">94%</text>
