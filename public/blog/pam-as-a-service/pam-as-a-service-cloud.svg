  <rect x="40" y="88" width="220" height="270" rx="12" fill="#0D1F35" stroke="#64748b" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="150" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#94a3b8">On-Premises (Legacy)</text>
  <!-- Server icons -->
  <rect x="72" y="134" width="156" height="34" rx="6" fill="#0A1628" stroke="#334155" stroke-width="1"/>
  <text x="106" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">🖥</text>
