  <text x="520" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Auto Rotation</text>
  <text x="520" y="193" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Zero manual effort</text>

  <rect x="408" y="208" width="204" height="34" rx="6" fill="#0A1628" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
