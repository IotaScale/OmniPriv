  <line x1="668" y1="178" x2="766" y2="178" stroke="#1e3a5f" stroke-width="1"/>

  <text x="717" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#4ade80">3×</text>
  <text x="717" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Faster Audits</text>

  <line x1="668" y1="234" x2="766" y2="234" stroke="#1e3a5f" stroke-width="1"/>

  <text x="717" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#a78bfa">60%</text>
  <text x="717" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Lower TCO</text>

  <line x1="668" y1="290" x2="766" y2="290" stroke="#1e3a5f" stroke-width="1"/>

  <text x="717" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#f59e0b">24/7</text>
  <text x="717" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Visibility</text>

  <!-- Bottom label -->
  <text x="410" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">OmniPriv — Enterprise PAM as a Service Platform</text>
