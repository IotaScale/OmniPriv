  <text x="180" y="163" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#475569">Manual updates</text>

  <rect x="72" y="178" width="156" height="34" rx="6" fill="#0A1628" stroke="#334155" stroke-width="1"/>
  <text x="106" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">🔑</text>
  <text x="180" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Manual Rotation</text>
  <text x="180" y="207" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#475569">Error-prone</text>

  <rect x="72" y="222" width="156" height="34" rx="6" fill="#0A1628" stroke="#334155" stroke-width="1"/>
  <text x="106" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">📋</text>
  <text x="180" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Complex Audits</text>
  <text x="180" y="251" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#475569">Weeks of prep</text>

  <rect x="72" y="266" width="156" height="34" rx="6" fill="#0A1628" stroke="#334155" stroke-width="1"/>
  <text x="106" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">💸</text>
