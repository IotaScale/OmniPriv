<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bg-svc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bg-svc)" rx="14"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Choosing the Right PAM Services: Key Capabilities</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">What to look for in top privileged access management solutions</text>

  <!-- Central hub -->
  <circle cx="410" cy="228" r="58" fill="#00B8FF" fill-opacity="0.07" stroke="#00B8FF" stroke-width="2" stroke-opacity="0.5"/>
  <text x="410" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#00B8FF">🛡</text>
  <text x="410" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">PAM</text>
  <text x="410" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Services</text>

  <!-- Node 1: Credential Vaulting (top) -->
  <rect x="305" y="80" width="210" height="50" rx="8" fill="#0D1F35" stroke="#00B8FF" stroke-width="1.3" stroke-opacity="0.7"/>
  <text x="350" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#00B8FF">🔐</text>
  <text x="420" y="102" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Credential Vaulting</text>
  <text x="420" y="118" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Secure, encrypted credential store</text>
  <line x1="410" y1="130" x2="410" y2="170" stroke="#00B8FF" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Node 2: Session Management (right) -->
  <rect x="630" y="170" width="165" height="50" rx="8" fill="#0D1F35" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.7"/>
  <text x="668" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#4ade80">📹</text>
  <text x="720" y="192" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Session Mgmt</text>
  <text x="720" y="208" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Record &amp; audit all access</text>
  <line x1="630" y1="195" x2="468" y2="215" stroke="#4ade80" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Node 3: IAM/SSO Integration (right-bottom) -->
  <rect x="608" y="265" width="190" height="50" rx="8" fill="#0D1F35" stroke="#a78bfa" stroke-width="1.3" stroke-opacity="0.7"/>
  <text x="648" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#a78bfa">🔗</text>
  <text x="700" y="287" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">IAM / SSO Integration</text>
  <text x="700" y="303" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Connects with existing identity tools</text>
  <line x1="608" y1="285" x2="466" y2="248" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5,4"/>

