  <text x="340" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#f59e0b">📊</text>
  <text x="400" y="347" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Compliance Reporting</text>
  <text x="400" y="363" font-family="Arial, sans-serif" font-size="9" fill="#64748b">GDPR · HIPAA · PCI-DSS ready</text>
  <line x1="410" y1="325" x2="410" y2="286" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Node 5: Analytics (left-bottom) -->
  <rect x="22" y="265" width="185" height="50" rx="8" fill="#0D1F35" stroke="#ef4444" stroke-width="1.3" stroke-opacity="0.7"/>
  <text x="62" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">🧠</text>
  <text x="102" y="287" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Threat Analytics</text>
  <text x="102" y="303" font-family="Arial, sans-serif" font-size="9" fill="#64748b">AI anomaly detection &amp; alerts</text>
  <line x1="207" y1="285" x2="354" y2="248" stroke="#ef4444" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Node 6: Cloud Coverage (left) -->
  <rect x="25" y="170" width="185" height="50" rx="8" fill="#0D1F35" stroke="#00B8FF" stroke-width="1.3" stroke-opacity="0.5"/>
  <text x="65" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#00B8FF">☁</text>
  <text x="105" y="192" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Cloud Coverage</text>
  <text x="105" y="208" font-family="Arial, sans-serif" font-size="9" fill="#64748b">AWS · Azure · GCP · Hybrid</text>
  <line x1="210" y1="195" x2="352" y2="215" stroke="#00B8FF" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Footer -->
  <text x="410" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">OmniPriv delivers all six capabilities in one unified PAM services platform</text>
</svg>
