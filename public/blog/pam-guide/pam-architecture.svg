  <rect x="34" y="268" width="22" height="18" rx="4" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="39" y="274" width="12" height="2" rx="1" fill="#34d399" fill-opacity="0.6"/>
  <rect x="39" y="278" width="8" height="2" rx="1" fill="#34d399" fill-opacity="0.5"/>
  <text x="63" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Service Account</text>
  <text x="63" y="294" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Automated tasks</text>
  <rect x="63" y="301" width="66" height="7" rx="3.5" fill="#34d399" fill-opacity="0.1"/>
  <text x="96" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#34d399">Auto-rotated</text>

  <!-- Third-party vendor -->
  <rect x="22" y="328" width="176" height="52" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="110" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Third-Party Vendor</text>
  <text x="110" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Time-limited access only</text>

  <!-- ── ARROWS LEFT → CENTER ── -->
  <line x1="198" y1="136" x2="304" y2="200" stroke="#00B8FF" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <line x1="198" y1="210" x2="304" y2="223" stroke="#00B8FF" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <line x1="198" y1="284" x2="304" y2="248" stroke="#00B8FF" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>
  <line x1="198" y1="354" x2="304" y2="260" stroke="#00B8FF" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowB)"/>

