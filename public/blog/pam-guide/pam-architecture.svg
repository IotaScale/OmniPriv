  <rect x="322" y="225" width="4" height="30" rx="2" fill="#00B8FF" fill-opacity="0.75"/>
  <text x="334" y="244" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">Session Recording</text>

  <rect x="322" y="262" width="176" height="30" rx="6" fill="#00B8FF" fill-opacity="0.07"/>
  <rect x="322" y="262" width="4" height="30" rx="2" fill="#00B8FF" fill-opacity="0.75"/>
  <text x="334" y="281" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">Just-In-Time Access</text>

  <rect x="322" y="299" width="176" height="30" rx="6" fill="#00B8FF" fill-opacity="0.07"/>
  <rect x="322" y="299" width="4" height="30" rx="2" fill="#00B8FF" fill-opacity="0.75"/>
  <text x="334" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">Approval Workflows</text>

  <rect x="322" y="336" width="176" height="30" rx="6" fill="#00B8FF" fill-opacity="0.07"/>
  <rect x="322" y="336" width="4" height="30" rx="2" fill="#00B8FF" fill-opacity="0.75"/>
  <text x="334" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">Immutable Audit Logs</text>

  <!-- ── ARROWS CENTER → RIGHT ── -->
  <line x1="516" y1="210" x2="618" y2="152" stroke="#818cf8" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowP)"/>
  <line x1="516" y1="232" x2="618" y2="234" stroke="#818cf8" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowP)"/>
  <line x1="516" y1="254" x2="618" y2="308" stroke="#818cf8" stroke-width="1.4" stroke-opacity="0.45" stroke-dasharray="5,3" marker-end="url(#arrowP)"/>

