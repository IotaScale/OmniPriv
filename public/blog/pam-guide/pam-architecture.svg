<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
    <linearGradient id="pamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B8FF;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0060FF;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00B8FF" opacity="0.65"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#818cf8" opacity="0.65"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bgGrad)" rx="14"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="820" y2="210" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>
  <line x1="410" y1="0" x2="410" y2="420" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>

  <!-- TOP TITLE -->
  <text x="410" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">How Privileged Access Management Works</text>
  <text x="410" y="64" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b">Every privileged session is authenticated, controlled, and recorded through a central PAM gateway</text>

  <!-- COLUMN LABELS -->
  <text x="110" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="1.5">REQUESTERS</text>
  <text x="410" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="1.5">PAM PLATFORM</text>
  <text x="710" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#475569" letter-spacing="1.5">PROTECTED SYSTEMS</text>

  <!-- ── LEFT: REQUESTERS ── -->

  <!-- Admin User -->
  <rect x="22" y="106" width="176" height="60" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <circle cx="45" cy="136" r="10" fill="#00B8FF" fill-opacity="0.15" stroke="#00B8FF" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="45" cy="132" r="4" fill="#00B8FF" fill-opacity="0.7"/>
  <path d="M37 148 Q45 143 53 148" stroke="#00B8FF" stroke-width="1.3" fill="none" stroke-opacity="0.7"/>
  <text x="63" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Admin User</text>
  <text x="63" y="146" font-family="Arial, sans-serif" font-size="11" fill="#64748b">IT administrator</text>
  <rect x="63" y="153" width="52" height="7" rx="3.5" fill="#00B8FF" fill-opacity="0.15"/>
  <text x="89" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#00B8FF">Elevated</text>

  <!-- DevOps -->
  <rect x="22" y="180" width="176" height="60" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="35" y="196" width="20" height="14" rx="3" fill="#818cf8" fill-opacity="0.2" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="37" y="202" width="16" height="2" rx="1" fill="#818cf8" fill-opacity="0.6"/>
  <rect x="37" y="206" width="10" height="2" rx="1" fill="#818cf8" fill-opacity="0.4"/>
  <text x="63" y="204" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">DevOps Team</text>
  <text x="63" y="220" font-family="Arial, sans-serif" font-size="11" fill="#64748b">CI/CD pipelines</text>
  <rect x="63" y="227" width="62" height="7" rx="3.5" fill="#818cf8" fill-opacity="0.15"/>
  <text x="94" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#818cf8">Needs approval</text>

  <!-- Service Account -->
