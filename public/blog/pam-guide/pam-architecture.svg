  <rect x="322" y="151" width="176" height="30" rx="6" fill="#00B8FF" fill-opacity="0.07"/>
  <rect x="322" y="151" width="4" height="30" rx="2" fill="#00B8FF" fill-opacity="0.75"/>
  <text x="334" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">Credential Vaulting</text>

  <rect x="322" y="188" width="176" height="30" rx="6" fill="#00B8FF" fill-opacity="0.07"/>
  <rect x="322" y="188" width="4" height="30" rx="2" fill="#00B8FF" fill-opacity="0.75"/>
  <text x="334" y="207" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">MFA Enforcement</text>

