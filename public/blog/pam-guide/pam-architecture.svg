  <!-- Servers -->
  <rect x="618" y="106" width="180" height="66" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="632" y="122" width="26" height="18" rx="3" fill="#818cf8" fill-opacity="0.2" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="636" y="144" width="18" height="4" rx="2" fill="#818cf8" fill-opacity="0.35"/>
  <text x="668" y="128" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Servers</text>
  <text x="668" y="143" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Linux / Windows</text>
  <text x="668" y="158" font-family="Arial, sans-serif" font-size="10" fill="#475569">SSH / RDP sessions</text>

  <!-- Databases -->
  <rect x="618" y="184" width="180" height="66" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <ellipse cx="649" cy="208" rx="14" ry="6" fill="none" stroke="#818cf8" stroke-width="1.3" stroke-opacity="0.5"/>
  <line x1="635" y1="208" x2="635" y2="226" stroke="#818cf8" stroke-width="1.3" stroke-opacity="0.5"/>
  <line x1="663" y1="208" x2="663" y2="226" stroke="#818cf8" stroke-width="1.3" stroke-opacity="0.5"/>
  <ellipse cx="649" cy="226" rx="14" ry="6" fill="none" stroke="#818cf8" stroke-width="1.3" stroke-opacity="0.5"/>
  <text x="682" y="212" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Databases</text>
  <text x="682" y="227" font-family="Arial, sans-serif" font-size="11" fill="#64748b">SQL / Oracle / NoSQL</text>
  <text x="682" y="241" font-family="Arial, sans-serif" font-size="10" fill="#475569">Query-level logging</text>

  <!-- Cloud -->
  <rect x="618" y="262" width="180" height="66" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="708" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Cloud Infrastructure</text>
  <text x="708" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">AWS / Azure / GCP</text>
  <text x="708" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34d399">IAM roles managed</text>

  <!-- Network Devices -->
  <rect x="618" y="340" width="180" height="46" rx="9" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="708" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Network Devices</text>
  <text x="708" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Firewalls / Switches</text>

  <!-- BOTTOM NOTE -->
  <text x="410" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155">Credentials never leave the vault — admins access systems through proxied, fully recorded sessions</text>
</svg>
