<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bg3)" rx="14"/>

  <!-- Title -->
  <text x="410" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Privileged Access Management Best Practices</text>
  <text x="410" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Seven essential controls to reduce privileged access risk and strengthen compliance posture</text>

  <!-- Row 1: items 1, 2, 3 -->

  <!-- Item 1 -->
  <rect x="22" y="84" width="244" height="96" rx="11" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="22" y="84" width="244" height="4" rx="2" fill="#00B8FF" fill-opacity="0.5"/>
  <circle cx="54" cy="116" r="16" fill="#00B8FF" fill-opacity="0.12" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="54" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#00B8FF">1</text>
  <text x="80" y="111" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Discover All</text>
  <text x="80" y="127" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Privileged Accounts</text>
  <text x="34" y="153" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Include service, shared, and</text>
  <text x="34" y="166" font-family="Arial, sans-serif" font-size="11" fill="#64748b">dormant accounts in your inventory</text>

  <!-- Item 2 -->
  <rect x="288" y="84" width="244" height="96" rx="11" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="288" y="84" width="244" height="4" rx="2" fill="#00B8FF" fill-opacity="0.5"/>
  <circle cx="320" cy="116" r="16" fill="#00B8FF" fill-opacity="0.12" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="320" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#00B8FF">2</text>
  <text x="346" y="111" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Enforce MFA for</text>
  <text x="346" y="127" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Every Privileged Login</text>
  <text x="300" y="153" font-family="Arial, sans-serif" font-size="11" fill="#64748b">No exceptions — hardware tokens</text>
  <text x="300" y="166" font-family="Arial, sans-serif" font-size="11" fill="#64748b">provide the strongest assurance</text>

  <!-- Item 3 -->
  <rect x="554" y="84" width="244" height="96" rx="11" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="554" y="84" width="244" height="4" rx="2" fill="#00B8FF" fill-opacity="0.5"/>
  <circle cx="586" cy="116" r="16" fill="#00B8FF" fill-opacity="0.12" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="586" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#00B8FF">3</text>
  <text x="612" y="111" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Apply Least-Privilege</text>
  <text x="612" y="127" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Access Everywhere</text>
  <text x="566" y="153" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Grant only the minimum permissions</text>
  <text x="566" y="166" font-family="Arial, sans-serif" font-size="11" fill="#64748b">required for each specific task</text>

  <!-- Row 2: items 4, 5, 6 -->

  <!-- Item 4 -->
  <rect x="22" y="196" width="244" height="96" rx="11" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="22" y="196" width="244" height="4" rx="2" fill="#6366f1" fill-opacity="0.5"/>
  <circle cx="54" cy="228" r="16" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="54" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#818cf8">4</text>
  <text x="80" y="223" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Remove Permanent</text>
  <text x="80" y="239" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Admin Rights</text>
  <text x="34" y="265" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Use Just-In-Time access instead</text>
  <text x="34" y="278" font-family="Arial, sans-serif" font-size="11" fill="#64748b">of standing administrator accounts</text>

  <!-- Item 5 -->
  <rect x="288" y="196" width="244" height="96" rx="11" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="288" y="196" width="244" height="4" rx="2" fill="#6366f1" fill-opacity="0.5"/>
  <circle cx="320" cy="228" r="16" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="320" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#818cf8">5</text>
  <text x="346" y="223" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Rotate Passwords</text>
  <text x="346" y="239" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Automatically</text>
  <text x="300" y="265" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Automate rotation on a schedule</text>
  <text x="300" y="278" font-family="Arial, sans-serif" font-size="11" fill="#64748b">or after every privileged session</text>

  <!-- Item 6 -->
  <rect x="554" y="196" width="244" height="96" rx="11" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="554" y="196" width="244" height="4" rx="2" fill="#6366f1" fill-opacity="0.5"/>
  <circle cx="586" cy="228" r="16" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="586" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#818cf8">6</text>
  <text x="612" y="223" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Record All Privileged</text>
  <text x="612" y="239" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Sessions</text>
  <text x="566" y="265" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Keystroke logs and screen recordings</text>
  <text x="566" y="278" font-family="Arial, sans-serif" font-size="11" fill="#64748b">support investigations and compliance</text>

  <!-- Row 3: item 7 centered -->
  <rect x="288" y="308" width="244" height="90" rx="11" fill="#0D1F35" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="288" y="308" width="244" height="4" rx="2" fill="#34d399" fill-opacity="0.5"/>
  <circle cx="320" cy="340" r="16" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="320" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#34d399">7</text>
  <text x="346" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Review and Revoke</text>
  <text x="346" y="351" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Unused Access Regularly</text>
  <text x="300" y="375" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Conduct quarterly access reviews and</text>
  <text x="300" y="388" font-family="Arial, sans-serif" font-size="11" fill="#64748b">remove accounts with no justification</text>

  <!-- Side labels -->
  <text x="11" y="142" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#00B8FF" transform="rotate(-90, 11, 142)" text-anchor="middle">ESSENTIAL</text>
  <text x="11" y="254" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#818cf8" transform="rotate(-90, 11, 254)" text-anchor="middle">ENFORCE</text>
  <text x="11" y="363" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#34d399" transform="rotate(-90, 11, 363)" text-anchor="middle">SUSTAIN</text>
</svg>
