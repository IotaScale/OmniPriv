<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 390" width="820" height="390">
  <defs>
    <linearGradient id="bg-road" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B8FF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0066AA;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <rect width="820" height="390" fill="url(#bg-road)" rx="14"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff">PAM Implementation Roadmap for Privileged Access Management Solutions</text>
  <text x="410" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#64748b">A phased approach to deploying best privileged access management solutions in 2026</text>

  <!-- Timeline line -->
  <line x1="60" y1="200" x2="760" y2="200" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Phase 1 -->
  <circle cx="116" cy="200" r="20" fill="#00B8FF" fill-opacity="0.15" stroke="#00B8FF" stroke-width="2"/>
  <text x="116" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#00B8FF">1</text>
  <!-- Above line -->
  <line x1="116" y1="180" x2="116" y2="130" stroke="#00B8FF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <rect x="46" y="76" width="140" height="54" rx="8" fill="#0D1F35" stroke="#00B8FF" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="116" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#00B8FF">Discovery &amp;</text>
  <text x="116" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#00B8FF">Inventory</text>
  <text x="116" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">Weeks 1–4</text>
  <!-- Below line -->
  <text x="116" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">All accounts</text>
  <text x="116" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">discovered</text>

  <!-- Phase 2 -->
  <circle cx="256" cy="200" r="20" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="2"/>
  <text x="256" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">2</text>
  <!-- Below line -->
  <line x1="256" y1="220" x2="256" y2="270" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <rect x="186" y="270" width="140" height="54" rx="8" fill="#0D1F35" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="256" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#a78bfa">Vaulting &amp;</text>
  <text x="256" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#a78bfa">Rotation</text>
  <text x="256" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">Weeks 4–8</text>
  <!-- Above line -->
  <text x="256" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Credentials</text>
  <text x="256" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">secured &amp; rotated</text>

  <!-- Phase 3 -->
  <circle cx="396" cy="200" r="20" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-width="2"/>
  <text x="396" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#4ade80">3</text>
  <!-- Above line -->
  <line x1="396" y1="180" x2="396" y2="130" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <rect x="326" y="76" width="140" height="54" rx="8" fill="#0D1F35" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="396" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Session</text>
  <text x="396" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Management</text>
  <text x="396" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">Weeks 8–12</text>
  <!-- Below -->
  <text x="396" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Proxied sessions</text>
  <text x="396" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">&amp; recording live</text>

  <!-- Phase 4 -->
  <circle cx="536" cy="200" r="20" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <text x="536" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#f59e0b">4</text>
  <!-- Below line -->
  <line x1="536" y1="220" x2="536" y2="270" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <rect x="466" y="270" width="140" height="54" rx="8" fill="#0D1F35" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="536" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Just-in-Time</text>
  <text x="536" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Access</text>
  <text x="536" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">Weeks 12–16</text>
  <!-- Above -->
  <text x="536" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Standing privilege</text>
  <text x="536" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">eliminated</text>

  <!-- Phase 5 -->
  <circle cx="704" cy="200" r="20" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="704" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ef4444">5</text>
  <!-- Above line -->
  <line x1="704" y1="180" x2="704" y2="130" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <rect x="634" y="76" width="140" height="54" rx="8" fill="#0D1F35" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="704" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">Compliance &amp;</text>
  <text x="704" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">Reporting</text>
  <text x="704" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">Ongoing</text>
  <!-- Below -->
  <text x="704" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">ISO 27001 · PCI-DSS</text>
  <text x="704" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">SOC 2 · HIPAA</text>

  <text x="410" y="376" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#475569">OmniPriv PAM Solution — Structured rollout that minimizes disruption and maximizes security gains</text>
</svg>
