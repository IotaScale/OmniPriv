<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <defs>
    <linearGradient id="bg-uc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="440" fill="url(#bg-uc)" rx="14"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Top 5 Privileged Access Management Use Cases</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Real-world PAM applications securing enterprise environments in 2026</text>

  <!-- Use Case 1: Securing Admin Accounts -->
  <rect x="40" y="80" width="220" height="130" rx="11" fill="#0D1F35" stroke="#00B8FF" stroke-width="1.4" stroke-opacity="0.7"/>
  <text x="150" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#00B8FF">🛡</text>
  <text x="150" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Admin Account Security</text>
  <text x="60" y="152" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Strong authentication + auto</text>
  <text x="60" y="166" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">password rotation on all</text>
  <text x="60" y="180" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">administrator accounts.</text>
  <rect x="60" y="192" width="140" height="8" rx="4" fill="#0A1628"/>
  <rect x="60" y="192" width="126" height="8" rx="4" fill="#00B8FF" fill-opacity="0.6"/>

  <!-- Use Case 2: Third-Party Access -->
  <rect x="300" y="80" width="220" height="130" rx="11" fill="#0D1F35" stroke="#a78bfa" stroke-width="1.4" stroke-opacity="0.7"/>
  <text x="410" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#a78bfa">🔗</text>
  <text x="410" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Third-Party Access</text>
  <text x="320" y="152" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Scoped, time-limited sessions</text>
  <text x="320" y="166" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">for vendors and contractors</text>
  <text x="320" y="180" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">with full audit trails.</text>
  <rect x="320" y="192" width="140" height="8" rx="4" fill="#0A1628"/>
  <rect x="320" y="192" width="112" height="8" rx="4" fill="#a78bfa" fill-opacity="0.6"/>

  <!-- Use Case 3: Least Privilege -->
  <rect x="560" y="80" width="220" height="130" rx="11" fill="#0D1F35" stroke="#4ade80" stroke-width="1.4" stroke-opacity="0.7"/>
  <text x="670" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#4ade80">🔒</text>
  <text x="670" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Least Privilege Enforcement</text>
  <text x="580" y="152" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Remove unnecessary perms.</text>
  <text x="580" y="166" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Grant only what is needed</text>
  <text x="580" y="180" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">for the task at hand.</text>
  <rect x="580" y="192" width="140" height="8" rx="4" fill="#0A1628"/>
  <rect x="580" y="192" width="133" height="8" rx="4" fill="#4ade80" fill-opacity="0.6"/>

  <!-- Use Case 4: Session Monitoring -->
  <rect x="170" y="250" width="220" height="130" rx="11" fill="#0D1F35" stroke="#f59e0b" stroke-width="1.4" stroke-opacity="0.7"/>
  <text x="280" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#f59e0b">📹</text>
  <text x="280" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Session Monitoring</text>
  <text x="190" y="322" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Record every privileged session.</text>
  <text x="190" y="336" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Detect suspicious actions and</text>
  <text x="190" y="350" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">respond instantly to incidents.</text>
  <rect x="190" y="362" width="140" height="8" rx="4" fill="#0A1628"/>
  <rect x="190" y="362" width="119" height="8" rx="4" fill="#f59e0b" fill-opacity="0.6"/>

  <!-- Use Case 5: Compliance -->
  <rect x="430" y="250" width="220" height="130" rx="11" fill="#0D1F35" stroke="#ef4444" stroke-width="1.4" stroke-opacity="0.7"/>
  <text x="540" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#ef4444">📋</text>
  <text x="540" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Compliance Support</text>
  <text x="450" y="322" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Auto-generate audit logs and</text>
  <text x="450" y="336" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">reports for GDPR, HIPAA,</text>
  <text x="450" y="350" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">PCI-DSS, and SOC 2.</text>
  <rect x="450" y="362" width="140" height="8" rx="4" fill="#0A1628"/>
  <rect x="450" y="362" width="105" height="8" rx="4" fill="#ef4444" fill-opacity="0.6"/>

  <!-- Legend labels -->
  <text x="150" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00B8FF">Coverage: 90%</text>
  <text x="410" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">Coverage: 80%</text>
  <text x="670" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4ade80">Coverage: 95%</text>
  <text x="280" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Coverage: 85%</text>
  <text x="540" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">Coverage: 75%</text>

  <!-- Footer -->
  <text x="410" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">OmniPriv covers all five use cases in a single unified PAM platform</text>
</svg>
