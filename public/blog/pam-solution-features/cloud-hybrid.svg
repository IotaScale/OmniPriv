<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bg-ch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bg-ch)" rx="14"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Cloud &amp; Hybrid Environment PAM Support</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Unified privileged access control across on-premises, private cloud, and multi-cloud environments</text>

  <!-- Center PAM Platform -->
  <rect x="310" y="155" width="200" height="110" rx="14" fill="#0D1F35" stroke="#00B8FF" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="310" y="155" width="200" height="5" rx="3" fill="#00B8FF" fill-opacity="0.7"/>
  <text x="410" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#00B8FF">🛡</text>
  <text x="410" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">PAM Control Plane</text>
  <text x="410" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Unified Policy &amp; Audit</text>
  <text x="410" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Session Gateway · Vault</text>

  <!-- On-Premises -->
  <rect x="32" y="100" width="160" height="80" rx="10" fill="#0D1F35" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="112" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#a78bfa">🖥</text>
  <text x="112" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">On-Premises</text>
  <text x="112" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Windows · Linux · DB</text>
  <line x1="192" y1="140" x2="308" y2="195" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5,4"/>

  <!-- AWS -->
  <rect x="32" y="240" width="160" height="80" rx="10" fill="#0D1F35" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="112" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fbbf24">☁</text>
  <text x="112" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Amazon AWS</text>
  <text x="112" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">EC2 · IAM Roles · S3</text>
  <line x1="192" y1="280" x2="308" y2="225" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5,4"/>

  <!-- Azure -->
  <rect x="628" y="100" width="160" height="80" rx="10" fill="#0D1F35" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="708" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#38bdf8">☁</text>
  <text x="708" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Microsoft Azure</text>
  <text x="708" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Azure AD · VMs · Key Vault</text>
  <line x1="628" y1="140" x2="512" y2="195" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5,4"/>

  <!-- GCP -->
  <rect x="628" y="240" width="160" height="80" rx="10" fill="#0D1F35" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="708" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4ade80">☁</text>
  <text x="708" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Google Cloud</text>
  <text x="708" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">GCP IAM · GKE · Compute</text>
  <line x1="628" y1="280" x2="512" y2="225" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5,4"/>

  <!-- Network Devices bottom center -->
  <rect x="310" y="320" width="200" height="70" rx="10" fill="#0D1F35" stroke="#fb7185" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="410" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fb7185">🔀</text>
  <text x="410" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">Network &amp; DevOps</text>
  <text x="410" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Firewalls · Kubernetes · CI/CD</text>
  <line x1="410" y1="265" x2="410" y2="320" stroke="#fb7185" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5,4"/>
</svg>
