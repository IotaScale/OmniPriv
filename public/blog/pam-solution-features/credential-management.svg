<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bg-cm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bg-cm)" rx="14"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Privileged Credential Management</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Securely store, rotate, and encrypt all privileged credentials in a centralised vault</text>

  <!-- Central Vault -->
  <rect x="305" y="85" width="210" height="210" rx="14" fill="#0D1F35" stroke="#00B8FF" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="305" y="85" width="210" height="5" rx="3" fill="#00B8FF" fill-opacity="0.6"/>
  <circle cx="410" cy="145" r="30" fill="#00B8FF" fill-opacity="0.08" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="410" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#00B8FF">🔐</text>
  <text x="410" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Credential Vault</text>
  <text x="410" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">AES-256 Encrypted</text>

  <!-- Credential types -->
  <rect x="322" y="226" width="52" height="48" rx="7" fill="#0A1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="348" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">🔑</text>
  <text x="348" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Passwords</text>

  <rect x="384" y="226" width="52" height="48" rx="7" fill="#0A1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="410" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">🗝</text>
  <text x="410" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">SSH Keys</text>

  <rect x="446" y="226" width="52" height="48" rx="7" fill="#0A1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="472" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">🪙</text>
  <text x="472" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">API Tokens</text>

  <!-- Left: Inputs -->
  <text x="130" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Credential Sources</text>
  <rect x="38" y="110" width="180" height="40" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="128" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Windows Admin Accounts</text>
  <text x="128" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Domain &amp; Local Admins</text>

  <rect x="38" y="162" width="180" height="40" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="128" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Database Credentials</text>
  <text x="128" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Oracle, SQL Server, MySQL</text>

  <rect x="38" y="214" width="180" height="40" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="128" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Cloud IAM Keys</text>
  <text x="128" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">AWS · Azure · GCP</text>

  <rect x="38" y="266" width="180" height="40" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="128" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Service Account Secrets</text>
  <text x="128" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">App passwords &amp; certificates</text>

  <!-- Connector arrows left -->
  <line x1="218" y1="130" x2="303" y2="158" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="218" y1="182" x2="303" y2="172" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="218" y1="234" x2="303" y2="192" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="218" y1="286" x2="303" y2="220" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Right: Auto-rotation output -->
  <text x="670" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Auto-Rotation Benefits</text>

  <rect x="517" y="110" width="200" height="40" rx="8" fill="#0D1F35" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="617" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4ade80">● Rotated after every use</text>
  <text x="617" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Zero standing credentials</text>

  <rect x="517" y="162" width="200" height="40" rx="8" fill="#0D1F35" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="617" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4ade80">● Scheduled rotation cycles</text>
  <text x="617" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Configurable per credential class</text>

  <rect x="517" y="214" width="200" height="40" rx="8" fill="#0D1F35" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="617" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4ade80">● Breach exposure limited</text>
  <text x="617" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Compromised cred = 1 asset only</text>

  <rect x="517" y="266" width="200" height="40" rx="8" fill="#0D1F35" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="617" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4ade80">● Audit-ready rotation log</text>
  <text x="617" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Full compliance evidence</text>

  <!-- Connector arrows right -->
  <line x1="515" y1="158" x2="417" y2="158" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="515" y1="182" x2="417" y2="175" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="515" y1="230" x2="417" y2="200" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <line x1="515" y1="282" x2="417" y2="226" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>

  <!-- Bottom label -->
  <text x="410" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#38bdf8">OmniPriv encrypts, stores, and auto-rotates every privileged credential across your entire infrastructure</text>
</svg>
