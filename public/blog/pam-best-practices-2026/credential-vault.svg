<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="bg-cv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#030711"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bg-cv)" rx="14"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Secure Credential Vault &amp; Automatic Rotation</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">All secrets stored encrypted — automatically rotated after every use</text>

  <!-- Central Vault -->
  <rect x="300" y="85" width="220" height="210" rx="14" fill="#0D1F35" stroke="#00B8FF" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="300" y="85" width="220" height="5" rx="3" fill="#00B8FF" fill-opacity="0.6"/>
  <!-- Vault icon shape -->
  <circle cx="410" cy="145" r="32" fill="#00B8FF" fill-opacity="0.08" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="410" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#00B8FF">🔐</text>
  <text x="410" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Credential Vault</text>
  <text x="410" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">AES-256 Encrypted</text>

  <!-- Credential types in vault -->
  <rect x="318" y="228" width="56" height="44" rx="7" fill="#0A1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="346" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">🔑</text>
  <text x="346" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Passwords</text>

  <rect x="382" y="228" width="56" height="44" rx="7" fill="#0A1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="410" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">🗝</text>
  <text x="410" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">SSH Keys</text>

  <rect x="446" y="228" width="56" height="44" rx="7" fill="#0A1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="474" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">🪙</text>
  <text x="474" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">API Tokens</text>

  <!-- Left panel: Credential sources feeding the vault -->
  <text x="130" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Credential Sources</text>

  <rect x="42" y="108" width="176" height="42" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="130" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Windows Admin Accounts</text>
  <text x="130" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Domain &amp; Local Admins</text>

  <rect x="42" y="162" width="176" height="42" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="130" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Database Credentials</text>
  <text x="130" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Oracle, SQL Server, PostgreSQL</text>

  <rect x="42" y="216" width="176" height="42" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="130" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Cloud IAM Keys</text>
  <text x="130" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">AWS, Azure, GCP</text>

  <rect x="42" y="270" width="176" height="42" rx="8" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <text x="130" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Service Account Secrets</text>
  <text x="130" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">App passwords &amp; certificates</text>

  <!-- Connector arrows left to vault -->
  <line x1="218" y1="129" x2="298" y2="158" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="5,4"/>
  <line x1="218" y1="183" x2="298" y2="171" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="5,4"/>
  <line x1="218" y1="237" x2="298" y2="190" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="5,4"/>
  <line x1="218" y1="291" x2="298" y2="200" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="5,4"/>

  <!-- Right panel: auto-rotation clock -->
  <text x="670" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Rotation Scheduler</text>

  <!-- Rotation cycle graphic -->
  <circle cx="670" cy="170" r="52" fill="none" stroke="#1e3a5f" stroke-width="2"/>
  <path d="M670 118 A52 52 0 1 1 618.5 188" fill="none" stroke="#00B8FF" stroke-width="3" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="612,188 622,196 618,183" fill="#00B8FF" fill-opacity="0.7"/>
  <text x="670" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#00B8FF">↺</text>
  <text x="670" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Auto Rotate</text>

  <!-- Rotation events -->
  <rect x="602" y="234" width="136" height="26" rx="6" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4ade80">✓ After every use</text>

  <rect x="602" y="268" width="136" height="26" rx="6" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8">✓ On a set schedule</text>

  <rect x="602" y="302" width="136" height="26" rx="6" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#818cf8">✓ On policy trigger</text>

  <!-- Vault to right panel arrow -->
  <line x1="520" y1="185" x2="598" y2="170" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="5,4"/>

  <!-- Bottom strip -->
  <rect x="22" y="336" width="776" height="58" rx="10" fill="#0D1F35" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="22" y="336" width="776" height="3" rx="2" fill="#00B8FF" fill-opacity="0.4"/>
  <text x="410" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">No credential is ever shared, stored in plaintext, or reused after rotation</text>
  <text x="410" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Stolen credentials become instantly worthless once the rotation cycle runs</text>
</svg>
